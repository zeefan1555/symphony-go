<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle glow effect behind wordmark -->
  <ellipse cx="600" cy="280" rx="300" ry="40" fill="#6366f1" opacity="0.08"/>

  <!-- Wordmark: ITER//VOX -->
  <text x="600" y="300" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="96" font-weight="700" letter-spacing="4">
    <tspan fill="#6366f1">ITER</tspan><tspan fill="#9678e3">//</tspan><tspan fill="#c9cde0">VOX</tspan>
  </text>

  <!-- Thin accent line -->
  <line x1="420" y1="330" x2="780" y2="330" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#9678e3"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="400" fill="#71717a">
    Your codebase's journey, narrated by agents
  </text>
</svg>
