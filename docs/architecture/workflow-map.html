<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Symphony Go 工作流地图</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --panel-soft: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #334155;
      --active: #facc15;
      --backend: #34d399;
      --runtime: #38bdf8;
      --transport: #a78bfa;
      --external: #fb923c;
      --ops: #fb7185;
      --docs: #cbd5e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      background: radial-gradient(circle at 20% 10%, rgba(14, 165, 233, 0.12), transparent 28rem), var(--bg);
      color: var(--text);
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    header {
      padding: 0 0 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 1120px;
      color: var(--muted);
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(720px, 1fr) 330px;
      gap: 14px;
      height: calc(100vh - 124px);
      min-height: 680px;
    }

    .panel {
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
    }

    .side-panel {
      display: grid;
      grid-template-rows: minmax(260px, 0.78fr) minmax(240px, 1fr);
      gap: 12px;
      min-height: 0;
    }

    #flowButtons {
      display: block;
      padding: 12px;
      overflow-y: auto;
      height: calc(100% - 42px);
    }

    .panel h2 {
      margin: 0;
      padding: 14px 14px 10px;
      font-size: 13px;
      color: #f8fafc;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    }

    .flow-button {
      width: 100%;
      display: block;
      margin: 0 0 8px;
      padding: 9px 10px;
      color: var(--text);
      text-align: left;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 7px;
      background: rgba(2, 6, 23, 0.28);
      cursor: pointer;
      font: inherit;
    }

    .flow-button:hover,
    .flow-button.active {
      background: rgba(250, 204, 21, 0.08);
    }

    .flow-button.active {
      border-color: rgba(250, 204, 21, 0.72);
      box-shadow: 0 0 0 1px rgba(250, 204, 21, 0.18);
    }

    .flow-title {
      display: block;
      margin-bottom: 3px;
      color: #f8fafc;
      font-weight: 700;
      font-size: 12px;
    }

    .flow-summary {
      color: var(--muted);
      font-size: 10px;
    }

    .map-panel {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .map-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 6px;
      border-radius: 50%;
      background: var(--dot);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .map-viewport {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: rgba(2, 6, 23, 0.28);
    }

    .map-canvas {
      position: relative;
      width: 1300px;
      height: 900px;
      min-width: 1300px;
      background:
        linear-gradient(rgba(30, 41, 59, 0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 41, 59, 0.22) 1px, transparent 1px);
      background-size: 36px 36px;
      overflow: hidden;
      transform: scale(var(--map-scale, 1));
      transform-origin: top left;
    }

    .swimlanes {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .swimlane {
      position: absolute;
      top: 0;
      height: 900px;
      border-left: 1px dashed rgba(148, 163, 184, 0.09);
      border-right: 1px dashed rgba(148, 163, 184, 0.05);
      background: linear-gradient(90deg, rgba(148, 163, 184, 0.035), transparent);
    }

    .lane-label {
      position: absolute;
      top: 18px;
      left: 14px;
      color: rgba(148, 163, 184, 0.42);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .edges {
      position: absolute;
      inset: 0;
      width: 1300px;
      height: 900px;
      pointer-events: none;
      z-index: 1;
    }

    .node {
      position: absolute;
      z-index: 2;
      width: var(--w);
      min-height: var(--h);
      padding: 8px 9px;
      border: 1px solid color-mix(in srgb, var(--node-color), white 8%);
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.78));
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      opacity: 0.28;
      transition: opacity 160ms ease, border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .node.active {
      opacity: 1;
      border-color: var(--active);
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(250, 204, 21, 0.26), 0 16px 34px rgba(0, 0, 0, 0.34);
    }

    .node.touched {
      opacity: 0.88;
    }

    .node.external { --node-color: var(--external); }
    .node.entry { --node-color: var(--docs); }
    .node.runtime { --node-color: var(--runtime); }
    .node.service { --node-color: var(--backend); }
    .node.transport { --node-color: var(--transport); }
    .node.ops { --node-color: var(--ops); }

    .node-kind {
      display: block;
      margin-bottom: 3px;
      color: var(--node-color);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .node-name {
      display: block;
      color: #f8fafc;
      font-weight: 700;
      line-height: 1.25;
      font-size: 14px;
    }

    .node-package {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
    }

    .edge-path {
      fill: none;
      stroke: rgba(100, 116, 139, 0.35);
      stroke-width: 2;
    }

    .edge-path.active {
      stroke: var(--active);
      stroke-width: 3;
      filter: drop-shadow(0 0 5px rgba(250, 204, 21, 0.45));
    }

    .edge-label rect {
      fill: rgba(2, 6, 23, 0.92);
      stroke: rgba(250, 204, 21, 0.42);
      rx: 5;
    }

    .edge-label text {
      fill: #fde68a;
      font-size: 11px;
    }

    .detail-body {
      padding: 14px;
      height: calc(100% - 42px);
      overflow: auto;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 12px;
    }

    .pill {
      padding: 3px 8px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 999px;
      color: #cbd5e1;
      font-size: 11px;
      background: rgba(15, 23, 42, 0.84);
    }

    .detail-summary {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .step {
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.24);
    }

    .steps-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }

    .step-title {
      margin-bottom: 4px;
      color: #f8fafc;
      font-weight: 700;
    }

    .step-meta,
    .step-evidence {
      color: var(--muted);
      font-size: 12px;
    }

    .step-payload {
      margin: 7px 0;
      color: #bae6fd;
      font-size: 12px;
    }

    .json-preview {
      margin: 14px 0 0;
      padding: 12px;
      max-height: 220px;
      overflow: auto;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.72);
      color: #cbd5e1;
      font-size: 11px;
      white-space: pre-wrap;
    }

    .json-details {
      margin-top: 14px;
      color: var(--muted);
    }

    .json-details summary {
      cursor: pointer;
      color: #f8fafc;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      body {
        padding: 10px;
        font-size: 13px;
      }

      header {
        padding: 16px 14px 12px;
      }

      h1 {
        font-size: 22px;
      }

      .subtitle {
        font-size: 12px;
      }

      .shell {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 0;
      }

      .side-panel {
        grid-template-rows: auto auto;
      }

      #flowButtons {
        max-height: 320px;
      }

      .map-toolbar {
        flex-direction: column;
      }

      .hint {
        white-space: normal;
      }

      .map-viewport {
        flex: 0 0 auto;
        height: min(72vh, 760px);
        min-height: 0;
      }

      .detail-body {
        height: auto;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Symphony Go 工作流地图</h1>
    <p class="subtitle">这是一个由 JSON 驱动的单页地图，覆盖本仓运行时、控制面、workflow、workspace、Codex、Linear、telemetry 和构建动作。点击左侧动作后，页面会高亮涉及的包和组件，并说明每个边界传递了什么。</p>
  </header>

  <div class="shell">
    <main class="panel map-panel">
      <div class="map-toolbar">
        <div class="legend" id="legend"></div>
        <div class="hint">黄色节点和连线属于当前选中的动作。</div>
      </div>
      <div class="map-viewport" id="mapViewport">
        <div class="map-canvas" id="mapCanvas">
          <div class="swimlanes" id="swimlanes"></div>
          <svg class="edges" viewBox="0 0 1300 900" aria-hidden="true">
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#facc15"></polygon>
              </marker>
              <marker id="arrowhead-muted" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"></polygon>
              </marker>
            </defs>
            <g id="edgeLayer"></g>
          </svg>
          <div id="nodes"></div>
        </div>
      </div>
    </main>

    <aside class="side-panel">
      <section class="panel flow-list">
        <h2>流程</h2>
        <div id="flowButtons"></div>
      </section>

      <section class="panel detail">
        <h2>步骤</h2>
        <div class="detail-body" id="flowDetail"></div>
      </section>
    </aside>
  </div>

  </script>

  <script>
    const data = JSON.parse(document.getElementById("workflow-data").textContent);
    const components = new Map(data.components.map((component) => [component.id, component]));
    const mapSize = data.meta.coordinateSystem;
    const lanes = [
      { label: "外部动作", x: 0, width: 205 },
      { label: "入口 / 文档", x: 205, width: 240 },
      { label: "运行支撑", x: 445, width: 245 },
      { label: "核心业务服务", x: 690, width: 255 },
      { label: "集成 / 工具", x: 945, width: 205 },
      { label: "观测 / 外部", x: 1150, width: 150 }
    ];
    const state = { selected: data.flows[0].id };

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function center(component) {
      return {
        x: component.x + component.w / 2,
        y: component.y + component.h / 2
      };
    }

    function pathBetween(from, to) {
      const a = center(from);
      const b = center(to);
      const dx = Math.max(80, Math.abs(b.x - a.x) * 0.45);
      const c1x = a.x + (b.x >= a.x ? dx : -dx);
      const c2x = b.x - (b.x >= a.x ? dx : -dx);
      return `M ${a.x} ${a.y} C ${c1x} ${a.y}, ${c2x} ${b.y}, ${b.x} ${b.y}`;
    }

    function renderLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = Object.entries(data.componentKinds).map(([kind, meta]) =>
        `<span style="--dot:${meta.color}" data-kind="${kind}">${escapeHTML(meta.label)}</span>`
      ).join("");
    }

    function renderNodes() {
      const nodes = document.getElementById("nodes");
      nodes.innerHTML = data.components.map((component) => `
        <div class="node ${escapeHTML(component.kind)}" id="node-${escapeHTML(component.id)}"
          style="left:${component.x}px; top:${component.y}px; --w:${component.w}px; --h:${component.h}px">
          <span class="node-kind">${escapeHTML(data.componentKinds[component.kind]?.label || component.kind)}</span>
          <span class="node-name">${escapeHTML(component.name)}</span>
          <span class="node-package">${escapeHTML(component.package)}</span>
        </div>
      `).join("");
    }

    function renderSwimlanes() {
      const root = document.getElementById("swimlanes");
      root.innerHTML = lanes.map((lane) => `
        <div class="swimlane" style="left:${lane.x}px; width:${lane.width}px">
          <div class="lane-label">${escapeHTML(lane.label)}</div>
        </div>
      `).join("");
    }

    function renderFlowButtons() {
      const buttons = document.getElementById("flowButtons");
      buttons.innerHTML = data.flows.map((flow) => `
        <button class="flow-button" data-flow="${escapeHTML(flow.id)}">
          <span class="flow-title">${escapeHTML(flow.title)}</span>
          <span class="flow-summary">${escapeHTML(flow.summary)}</span>
        </button>
      `).join("");
      buttons.addEventListener("click", (event) => {
        const button = event.target.closest("[data-flow]");
        if (!button) return;
        state.selected = button.dataset.flow;
        renderSelection();
      });
    }

    function stepNodes(flow) {
      const ids = new Set();
      flow.steps.forEach((step) => {
        ids.add(step.from);
        ids.add(step.to);
      });
      return ids;
    }

    function renderEdges(flow) {
      const layer = document.getElementById("edgeLayer");
      layer.innerHTML = flow.steps.map((step, index) => {
        const from = components.get(step.from);
        const to = components.get(step.to);
        if (!from || !to) return "";
        const a = center(from);
        const b = center(to);
        const labelX = (a.x + b.x) / 2;
        const labelY = (a.y + b.y) / 2 - 8 + (index % 2 === 0 ? -10 : 12);
        const label = `${index + 1}. ${step.label}`;
        const labelWidth = Math.min(220, Math.max(80, label.length * 7));
        return `
          <path class="edge-path active" d="${pathBetween(from, to)}" marker-end="url(#arrowhead)"></path>
          <g class="edge-label">
            <rect x="${labelX - labelWidth / 2}" y="${labelY - 13}" width="${labelWidth}" height="20"></rect>
            <text x="${labelX}" y="${labelY + 1}" text-anchor="middle">${escapeHTML(label)}</text>
          </g>
        `;
      }).join("");
    }

    function renderDetail(flow) {
      const detail = document.getElementById("flowDetail");
      const touched = stepNodes(flow);
      const activePackages = data.components
        .filter((component) => touched.has(component.id))
        .map((component) => component.package);
      detail.innerHTML = `
        <div class="pill-row">
          <span class="pill">${escapeHTML(flow.category)}</span>
          <span class="pill">${flow.steps.length} 步</span>
          <span class="pill">${activePackages.length} 个组件</span>
        </div>
        <p class="detail-summary">${escapeHTML(flow.summary)}</p>
        <div class="step-meta"><strong>入口：</strong>${escapeHTML(flow.entrypoint)}</div>
        <div class="steps-grid">
          ${flow.steps.map((step, index) => `
            <div class="step">
              <div class="step-title">${index + 1}. ${escapeHTML(components.get(step.from)?.name || step.from)} -> ${escapeHTML(components.get(step.to)?.name || step.to)}</div>
              <div class="step-meta">${escapeHTML(step.annotation)}</div>
              <div class="step-payload">传递内容：${escapeHTML(step.payload)}</div>
              <div class="step-evidence">证据：${(step.evidence || []).map(escapeHTML).join(", ") || "无"}</div>
            </div>
          `).join("")}
        </div>
        <details class="json-details">
          <summary>查看当前流程 JSON</summary>
          <pre class="json-preview">${escapeHTML(JSON.stringify(flow, null, 2))}</pre>
        </details>
      `;
    }

    function fitMapToViewport() {
      const viewport = document.getElementById("mapViewport");
      const canvas = document.getElementById("mapCanvas");
      if (!viewport || !canvas) return;
      const availableWidth = viewport.clientWidth;
      const availableHeight = viewport.clientHeight;
      if (!availableWidth || !availableHeight) return;
      const scale = Math.min(1, availableWidth / mapSize.width, availableHeight / mapSize.height);
      canvas.style.setProperty("--map-scale", scale.toFixed(4));
      if (window.matchMedia("(max-width: 980px)").matches || availableWidth < 980) {
        viewport.style.height = `${Math.ceil(mapSize.height * scale)}px`;
      } else {
        viewport.style.height = "";
      }
    }

    function renderSelection() {
      const flow = data.flows.find((item) => item.id === state.selected) || data.flows[0];
      const touched = stepNodes(flow);

      document.querySelectorAll(".flow-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.flow === flow.id);
      });
      document.querySelectorAll(".node").forEach((node) => {
        const id = node.id.replace(/^node-/, "");
        node.classList.toggle("active", touched.has(id));
        node.classList.toggle("touched", touched.has(id));
      });
      renderEdges(flow);
      renderDetail(flow);
      fitMapToViewport();
    }

    renderLegend();
    renderSwimlanes();
    renderNodes();
    renderFlowButtons();
    renderSelection();
    window.addEventListener("resize", fitMapToViewport);
  </script>
