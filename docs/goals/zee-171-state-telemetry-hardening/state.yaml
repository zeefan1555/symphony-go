          status: pass
        - cmd: "./build.sh"
          status: pass
        - cmd: "./test.sh ./internal/runtime/logging ./internal/app"
          status: pass
        - cmd: "git diff --check"
          status: pass
        - cmd: "OTEL_SERVICE_NAME=symphony-go OTEL_EXPORTER_OTLP_PROTOCOL=grpc OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 OTEL_EXPORTER_OTLP_INSECURE=true make run-once ISSUE=ZEE-176 MERGE_TARGET=codex/zee-171-smoke"
          status: pass
        - cmd: "./test.sh ./internal/service/workflow ./internal/service/issueflow"
          status: pass
        - cmd: "OTEL_SERVICE_NAME=symphony-go OTEL_EXPORTER_OTLP_PROTOCOL=grpc OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 OTEL_EXPORTER_OTLP_INSECURE=true make run-once ISSUE=ZEE-177 MERGE_TARGET=codex/zee-171-smoke"
          status: pass
        - cmd: "docker exec signoz-clickhouse clickhouse-client --query \"SELECT name, attributes_string['from_state'], attributes_string['to_state'], attributes_string['outcome'] FROM signoz_traces.signoz_index_v3 WHERE attributes_string['issue_identifier'] = 'ZEE-177' ORDER BY timestamp\""
          status: pass
