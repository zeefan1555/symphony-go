        - "ZEE-177 SigNoz logs included dispatch started, Todo -> In Progress, codex_turn_completed, AI Review -> Pushing, Review PASS, Pushing -> Done, and Push PASS."
        - "ZEE-177 metrics included symphony_issue_transition_total with from_state/to_state/outcome attrs and no issue_identifier requirement."
        - "Console noise check for /tmp/zee-177-smoke.log produced no non-ZEE-177 issue identifiers."

