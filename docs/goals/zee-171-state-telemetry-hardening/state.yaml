      - "SigNoz traces query includes transition Todo -> In Progress, AI Review -> Pushing, and Pushing -> Done for issue_identifier=<ISSUE>."
      - "SigNoz logs query includes lifecycle logs for issue_identifier=<ISSUE>."
      - "SigNoz metrics query finds symphony_issue_transition_total with low-cardinality from_state/to_state/outcome attrs and does not require issue_identifier."
      - "make run-once ISSUE=<ISSUE> MERGE_TARGET=main 2>&1 | tee /tmp/symphony-smoke.log; rg 'issue=ZEE-' /tmp/symphony-smoke.log shows no issue different from <ISSUE>."
    stop_if:
