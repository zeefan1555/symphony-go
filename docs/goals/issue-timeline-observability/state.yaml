        - "git diff --check"
      stop_if:
        - "Need to rewrite issueflow orchestration."
        - "Any metric label would add issue_id, issue_identifier, session_id, or turn_id."
        - "Span parent/child ordering cannot be proven with the in-memory span recorder."
  - id: T003
    type: worker
