    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review T001 findings and convert the existing plan into the smallest safe implementation sequence."
    inputs:
      - "T001 receipt or note"
      - "User-provided plan facts in goal intake"
    constraints:
      - "Do not implement."
      - "Reject any slice that expands metrics cardinality."
      - "Reject any slice that logs raw Codex payloads, token deltas, message deltas, or long command output."
    expected_output:
      - "Decision on implementation order."
      - "Exact next Worker objective."
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Deferred or blocked items."
    receipt:
      result: done
      decision: "Execute T003 first. It is the smallest root-cause slice: RunIssueTrunk already defers endIssueRun, but StartIssueRun ends the span immediately, so fixing the facade creates the full parent span without broader orchestration changes."
