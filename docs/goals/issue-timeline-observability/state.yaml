# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Issue Timeline Observability"
  slug: "issue-timeline-observability"
  kind: existing_plan
  tranche: "Validate the provided telemetry plan, then complete successive safe implementation, docs, and smoke slices until single-issue Trace/Logs timeline drilldown is proven and Metrics remain low-cardinality."
  status: done
  intake:
    original_request: "Issue Timeline Observability 优化计划"
    interpreted_outcome: "A single issue can be inspected as a complete Trace/Logs timeline by issue_identifier, while Metrics stay global and low-cardinality."
    input_shape: existing_plan
    audience: "Symphony Go developers and operators using SigNoz for issue-run observability."
    authority: requested
    proof_type: test
    completion_proof: "Targeted tests, workflow tests, build, diff check, and a real issue smoke prove the trace/log timeline and metrics cardinality behavior described in the user plan."
    likely_misfire: "Adding more events without real parent span/turn durations, or making single-issue Metrics labels high-cardinality."
    blind_spots_considered:
      - "Current telemetry and issueflow code must be mapped before editing."
      - "Real SigNoz smoke may require collector credentials, live issue state transitions, and non-destructive external writes."
      - "Log exports must stay curated and avoid raw payloads, token deltas, message deltas, and long command output."
      - "Existing feat_zff workflow reasoning effort changes must be preserved."
    existing_plan_facts:
      - "issue_run span should open at RunIssueTrunk start and close at run end."
      - "issue_run span keeps issue_identifier, issue_id, attempt, state, and outcome."
      - "codex.Runner records per-turn started_at, completed_at, and duration_ms."
      - "codex.Result exposes timing so AfterTurn can use it."
      - "codex_turn_completed becomes a duration-bearing trace span and metric sample."
      - "AfterTurn computes phase/stage from turnStartIssue.State for continuation turns."
      - "turn span/log includes turn_count, continuation, phase, stage, state, duration_ms, session_id, and turn_id."
      - "OTel logs export curated codex_turn_started, codex_final, codex_command, and codex_file_change."
      - "codex_command logs command, cwd, exit_code, and duration_ms only."
      - "codex_final logs only a truncated summary."
      - "Raw codex_event stream, message delta, full shell output, token delta, and raw payloads remain excluded."
      - "Metrics labels must exclude issue_id, issue_identifier, session_id, and turn_id."
      - "symphony_issue_phase_duration_ms and symphony_issue_transition_duration_ms remain global aggregates."
      - "SigNoz docs need Issue Timeline drilldown query examples for traces, logs, and metrics boundaries."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board /Users/bytedance/symphony-go/docs/goals/issue-timeline-observability"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current issue timeline telemetry code paths and validate the user-provided plan against repo truth."
    inputs:
      - "User-provided Issue Timeline Observability plan"
      - "AGENTS.md"
      - "Current repo files related to codex runner, issueflow, telemetry, workflow docs, and tests"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Use concrete file:line evidence."
      - "Preserve existing feat_zff workflow reasoning effort changes."
    expected_output:
      - "Current code anchors for issue_run spans, Codex turn events, AfterTurn state handling, telemetry logs, metrics label filtering, and SigNoz docs."
      - "Plan gaps, risks, and any simpler implementation route."
      - "Recommended first Worker slice with allowed_files, verify commands, and stop_if conditions."
    receipt:
      result: done
      note: "notes/T001-repo-map.md"
      summary: "Mapped issue_run, codex turn timing, AfterTurn fields, curated logs, metrics cardinality, and SigNoz docs. First safe Worker is T003 because StartIssueRun closes issue_run immediately despite RunIssueTrunk already deferring endIssueRun."
