        - "internal/service/issueflow/flow.go:12"
        - "internal/service/issueflow/agent_session.go:77"
        - "internal/service/codex/runner.go:53"
        - "internal/runtime/telemetry/logs.go:14"
        - "internal/runtime/telemetry/attrs.go:10"
