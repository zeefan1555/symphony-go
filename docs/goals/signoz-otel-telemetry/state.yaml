# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "SigNoz OTLP Telemetry Retrofit"
  slug: "signoz-otel-telemetry"
  kind: existing_plan
  tranche: "Validate the provided plan, then implement successive safe commit slices until SigNoz/OTLP traces, metrics, and logs replace the long-term local observability metrics while preserving JSONL/runtime snapshot as bounded fallback surfaces."
  status: active
  intake:
    original_request: "根据已有 SigNoz + OTLP 改造计划，为 symphony-go 按分 commit 落地 Traces、Metrics、Logs，不按 PR 拆。"
    interpreted_outcome: "symphony-go gains a verified telemetry facade and staged SigNoz/OpenTelemetry integration across traces, metrics, log correlation, dashboard docs, and snapshot boundary cleanup."
    input_shape: existing_plan
    audience: "symphony-go local developer"
    authority: requested
    proof_type: test
    completion_proof: "All planned commit slices are either implemented and verified or explicitly blocked with receipts; final audit maps code/docs changes, local tests, build, and SigNoz/fake exporter evidence back to the original telemetry outcome."
    likely_misfire: "The goal produces planning artifacts or scattered OTel calls without an end-to-end, low-cardinality, verifiable SigNoz telemetry path."
    blind_spots_considered:
      - "Local SigNoz/Docker availability may block live UI proof; use fake/exporter tests as local fallback and record live SigNoz blocker separately."
      - "Trace lifecycle across retry, human wait, and process restart needs an explicit v1 boundary before persistence."
      - "OTel Logs support and dependency choice must be validated before replacing JSONL behavior."
      - "Existing dirty files must be preserved and understood before any edits."
      - "Codex event payload must be whitelisted before entering traces or logs."
    existing_plan_facts:
      - "Phase 0 documents and proves local SigNoz OTLP endpoints before business code changes."
      - "Phase 1 adds an internal telemetry facade with noop behavior when OTEL is not configured."
      - "Phase 2 traces issueflow trunk transitions and issue run shape first."
      - "Phase 3 exports low-cardinality issue and Codex metrics."
      - "Phase 4 correlates logs with trace/span IDs before any full log migration."
      - "Phase 5 documents a minimal SigNoz dashboard and validation guide."
      - "Phase 6 narrows snapshot/TUI to runtime projection rather than long-term metrics truth."
      - "Implementation should land as independent commits, not PR-sized chunks."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: unknown
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/signoz-otel-telemetry"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T010

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the user-provided telemetry plan against the current repo state and choose the first safe commit slice."
    inputs:
      - "User-provided Phase 0-6 plan in goal.md"
      - "Current git status and dirty files"
      - "Current AGENTS.md and lesson.md repo rules"
      - "Relevant live code anchors for app startup, issueflow, orchestrator, logging, observability, and tests"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Preserve the existing plan facts unless live code disproves them."
      - "Do not overwrite or normalize unrelated dirty files."
    expected_output:
      - "Decision on whether the plan is executable as written or needs sequencing changes."
      - "Exact first Worker objective."
      - "allowed_files for the first Worker."
      - "verify commands for the first Worker."
      - "stop_if conditions for the first Worker."
      - "Any blocker or dirty-worktree caveat."
    receipt:
      result: done
      decision: "Plan is executable as commit-sized slices. Start with docs-only SigNoz local plan because it avoids Go behavior changes and creates the verification contract for later telemetry code."
