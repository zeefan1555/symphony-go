        - "internal/app/run.go:93 initializes runtime wiring where future telemetry provider can be added"
        - "internal/service/issueflow/flow.go:57 and :199/:208 cover trunk state transitions"
        - "internal/service/issueflow/agent_session.go:20 covers workspace/prompt/codex turn stages"
        - "internal/service/orchestrator/orchestrator.go:1058 tracks Codex event token/rate-limit state"
        - "internal/runtime/logging/jsonl.go:43 defines structured JSONL Event shape"
      next_allowed_task: T002
      worker_objective: "Commit slice 1: add local SigNoz telemetry plan and validation runbook without changing Go behavior."
      allowed_files:
        - "docs/telemetry/signoz-local.md"
        - "docs/telemetry/README.md"
      verify:
        - "git diff --check"
      stop_if:
        - "Need to change Go behavior."
        - "Need to overwrite existing docs not listed in allowed_files."
        - "SigNoz install commands require destructive Docker cleanup or credentials."

